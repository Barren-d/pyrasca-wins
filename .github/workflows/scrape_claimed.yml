name: Claimed scrape (every 48 min)

on:
  schedule:
    - cron: '0 0,4,8,12,16,20 * * *'
    - cron: '48 0,4,8,12,16,20 * * *'
    - cron: '36 1,5,9,13,17,21 * * *'
    - cron: '24 2,6,10,14,18,22 * * *'
    - cron: '12 3,7,11,15,19,23 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Random delay (up to 5 minutes)
        run: sleep $((RANDOM % 300))

      - name: Run claimed scrape
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scrape.py --mode claimed
