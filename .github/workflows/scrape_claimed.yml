name: Claimed scrape (every 72 min)

on:
  schedule:
    - cron: '0 0,6,12,18 * * *'
    - cron: '12 1,7,13,19 * * *'
    - cron: '24 2,8,14,20 * * *'
    - cron: '36 3,9,15,21 * * *'
    - cron: '48 4,10,16,22 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Random delay (up to 5 minutes)
        run: sleep $((RANDOM % 300))

      - name: Run claimed scrape
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scrape.py --mode claimed
